<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>С 8 Марта, Мамочка!</title>
    <!-- Подключаем красивые шрифты от Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <!-- Подключаем наш файл стилей -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-header">
          <h1>С 8 Марта, любимая мама! 💐</h1>
        </div>

        <div class="photo-frame">
          <!-- ВСТАВЬ СЮДА НАЗВАНИЕ СВОЕЙ КАРТИНКИ ВМЕСТО mom.jpg -->
          <img src="mom.jpg" alt="Фото мамы" class="main-photo" />
        </div>

        <div class="card-body">
          <p>
            Мамочка, поздравляю тебя с самым красивым весенним праздником!
            <br /><br />
            Спасибо тебе за твою бесконечную любовь, тепло и заботу. Желаю тебе
            крепкого здоровья, сияющих глаз и чтобы каждый день приносил только
            радость. Ты — самая лучшая!
          </p>
          <p class="signature">С любовью, твой ребенок ❤️</p>
        </div>
      </div>

      <!-- Декоративные элементы (сердечки на фоне) -->
      <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
      </div>
    </div>
  </body>
</html>
